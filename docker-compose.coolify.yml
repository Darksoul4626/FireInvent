# documentation: https://github.com/Darksoul4626/FireInvent
# slogan: Webbasierte Inventarisierungs- und Vermietungsloesung.
# tags: fireinvent,inventory,rental,nextjs,dotnet,postgres
# logo: svgs/fireinvent.svg
# port: 3000

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?fireinvent}
      POSTGRES_USER: ${POSTGRES_USER:?fireinvent_db_user}
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      FIREINVENT_DISABLE_HTTPS_REDIRECTION: "true"
      FIREINVENT_SEED_MODE: ${FIREINVENT_SEED_MODE:-none}
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/openapi/v1.json"]
      interval: 15s
      timeout: 15s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - SERVICE_URL_FRONTEND
      # Exposes only the frontend through Coolify's proxy on container port 3000.
      - SERVICE_URL_FRONTEND_3000
      - SERVICE_FQDN_FRONTEND_3000
      - APP_URL=$SERVICE_FQDN_FRONTEND_3000
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://backend:8080}
    # depends_on:
    #   backend:
    #     condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:3000 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
